# ============================================================
# QueryGen AI — Render.com Deployment Configuration
# ============================================================
# Deploys:
#   - querygen-backend  : FastAPI (Docker web service)
#   - querygen-frontend : React/Vite (Static site)
#
# Required Render secrets (set in dashboard, NOT here):
#   GROQ_API_KEY
#   GEMINI_API_KEY  (optional)
#   DATABASE_URL    (from Neon / Render Postgres)
#   QDRANT_URL      (from Qdrant Cloud dashboard)
#   QDRANT_API_KEY  (from Qdrant Cloud dashboard)
# ============================================================

services:
  # ── FastAPI Backend (Docker web service) ──────────────────
  - type: web
    name: querygen-backend
    env: docker
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    disk:
      name: sqlite-storage
      mountPath: /app/storage
      sizeGB: 10
    envVars:
      - key: APP_NAME
        value: "QueryGen AI"
      - key: APP_ENV
        value: "production"
      - key: LLM_PROVIDER
        value: "groq"
      - key: GROQ_API_KEY
        sync: false                    # Set this secret in Render dashboard
      - key: GEMINI_API_KEY
        sync: false                    # Set this secret in Render dashboard (optional)
      - key: DATABASE_URL
        sync: false                    # Set your PostgreSQL URL from Neon/Render
        value: "postgresql://username:password@ep-your-project-pooler.region.aws.neon.tech/database_name?sslmode=require&channel_binding=require"
      - key: QDRANT_URL
        sync: false                    # Set your Qdrant Cloud cluster URL
      - key: QDRANT_API_KEY
        sync: false                    # Set your Qdrant Cloud API key
      - key: QDRANT_COLLECTION_NAME
        value: "querygen_schema"
      - key: QDRANT_EMBEDDING_MODEL
        value: "BAAI/bge-small-en-v1.5"
      - key: DEFAULT_LIMIT
        value: "50"
      - key: MAX_ROWS
        value: "100"
      - key: QUERY_TIMEOUT_SECONDS
        value: "10"
      - key: MAX_RETRY_ATTEMPTS
        value: "2"
      - key: ALLOW_WRITE
        value: "false"
      - key: SQLITE_STORAGE_DIR
        value: "/app/storage/sqlite_workspaces"
    healthCheckPath: /api/health

  # ── React Frontend (Static site) ──────────────────────────
  - type: web
    name: querygen-frontend
    env: static
    region: oregon
    buildCommand: "npm install && npm run build"
    buildDir: frontend
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        # IMPORTANT: Replace with your actual backend service URL from Render dashboard.
        # Format: https://<your-backend-service-name>.onrender.com
        value: "https://querygen-backend.onrender.com"
